name: Release

# 推送 v* 标签：用当前 tag 指向的仓库代码编译并发版
# Go 交叉编译 + Flutter Android APK（不依赖本地未提交的 scripts/）
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile server and monitor
        run: |
          set -euo pipefail
          out=dist/release
          mkdir -p "$out"
          # 把 tag 打进二进制，安装器/更新才能读到真实版本（否则默认 dev）
          ver="${GITHUB_REF_NAME}"
          ldflags="-s -w -X github.com/ynlea/agent-status/pkg/buildinfo.Version=${ver}"
          echo "buildinfo.Version=${ver}"

          build_one() {
            local goos="$1" goarch="$2" bin="$3" pkg="$4"
            local ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi
            local name="${bin}-${goos}-${goarch}${ext}"
            echo "building $name"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="$ldflags" -o "$out/$name" "$pkg"
          }

          build_one linux amd64 agent-status-server ./cmd/server
          build_one linux arm64 agent-status-server ./cmd/server
          build_one linux amd64 agent-status-monitor ./cmd/monitor
          build_one linux arm64 agent-status-monitor ./cmd/monitor
          build_one windows amd64 agent-status-server ./cmd/server
          build_one windows amd64 agent-status-monitor ./cmd/monitor

          # 冒烟：确认 linux amd64 monitor 版本已注入
          chmod +x "$out/agent-status-monitor-linux-amd64"
          got="$("$out/agent-status-monitor-linux-amd64" -version | tr -d '\r\n')"
          echo "monitor -version => ${got}"
          if [ "$got" != "$ver" ]; then
            echo "version inject failed: want ${ver}, got ${got}" >&2
            exit 1
          fi

          (cd "$out" && sha256sum agent-status-* > sha256sums.txt)
          ls -la "$out"

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: dist/release/*
          if-no-files-found: error

  build-flutter-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required for signed release APK" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/qingya-release.jks"
          ls -la "$GITHUB_WORKSPACE/qingya-release.jks"

      - name: Build Android APK (release)
        env:
          # Android versionCode 上限 2100000000；用 run_number 即可
          BUILD_NO: ${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/qingya-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          test -n "${ANDROID_KEYSTORE_PASSWORD:-}"
          test -n "${ANDROID_KEY_ALIAS:-}"
          test -n "${ANDROID_KEY_PASSWORD:-}"
          flutter build apk --release \
            --build-name="$ver" \
            --build-number="${BUILD_NO}"

      - name: Stage APK
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist/flutter"
          cp -f build/app/outputs/flutter-apk/app-release.apk \
            "$GITHUB_WORKSPACE/dist/flutter/qingya-android-release.apk"
          ls -la "$GITHUB_WORKSPACE/dist/flutter"

      - name: Upload Flutter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android
          path: dist/flutter/*
          if-no-files-found: error

  build-flutter-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        env:
          BUILD_NO: ${{ github.run_number }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          flutter config --enable-windows-desktop
          $tag = $env:GITHUB_REF_NAME
          $ver = $tag -replace '^v',''
          if ([string]::IsNullOrWhiteSpace($ver)) { throw "empty version from tag $tag" }
          flutter build windows --release --build-name="$ver" --build-number="$env:BUILD_NO"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          # Chinese language file may be missing on some images; English-only is fine

      - name: Package setup.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC not found" }
          $tag = $env:GITHUB_REF_NAME
          $ver = $tag -replace '^v',''
          if ([string]::IsNullOrWhiteSpace($ver)) { throw "empty version from tag $tag" }
          $iss = "scripts\qingya_windows.iss"
          & $iscc "/DMyAppVersion=$ver" $iss
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\dist\flutter" | Out-Null
          Copy-Item -Force "build\windows\qingya-windows-setup.exe" `
            "$env:GITHUB_WORKSPACE\dist\flutter\qingya-windows-setup.exe"
          Get-ChildItem "$env:GITHUB_WORKSPACE\dist\flutter"

      - name: Upload Flutter Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows
          path: dist/flutter/*
          if-no-files-found: error

  release:
    needs: [build-go, build-flutter-android, build-flutter-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 完整历史与标签，用于生成可读 changelog
          fetch-depth: 0

      - name: Download Go artifacts
        uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: dist/release

      - name: Download Flutter Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: flutter-android
          path: dist/release

      - name: Download Flutter Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: flutter-windows
          path: dist/release

      - name: List assets
        run: ls -la dist/release

      - name: Build full release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          # 上一个 tag（按版本排序，排除当前）
          prev="$(git tag --list 'v*' --sort=-v:refname | grep -vxF "$tag" | head -n1 || true)"

          {
            echo "## ${tag}"
            echo
            if [ -n "${prev}" ]; then
              echo "相对上一版本：**${prev} → ${tag}**"
              echo
              echo "### 提交变更"
              echo
              # 完整列出提交标题，正文直接展示（不是 compare 链接）
              if git rev-parse "${prev}" >/dev/null 2>&1; then
                git log --reverse --pretty=format:'- %s (%h)' "${prev}..${tag}"
                echo
              else
                echo "- （无法解析上一标签，改为列出本 tag 指向提交）"
                git log -1 --pretty=format:'- %s (%h)'
                echo
              fi
            else
              echo "首个发布版本。"
              echo
              echo "### 提交变更"
              echo
              # 列出到达该 tag 的全部提交（完整展示，不使用 compare 链接）
              git log --reverse --pretty=format:'- %s (%h)' "${tag}"
              echo
            fi
            echo
            echo "### 本版资产"
            echo
            for f in dist/release/*; do
              [ -f "$f" ] || continue
              base="$(basename "$f")"
              size="$(du -h "$f" | awk '{print $1}')"
              echo "- \`${base}\`（${size}）"
            done
            echo
            echo "### 安装入口（脚本在仓库 main，二进制在本 Release）"
            echo
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.sh | bash"
            echo '```'
          } >"${notes_file}"

          # 预览进日志，方便排查
          echo "----- release notes -----"
          cat "${notes_file}"
          echo "-------------------------"
          echo "file=${notes_file}" >>"${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="${{ steps.notes.outputs.file }}"
          # 兜底：若 output 为空则重建路径
          if [ -z "${notes_file}" ] || [ ! -f "${notes_file}" ]; then
            notes_file="${RUNNER_TEMP}/release-notes.md"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* --clobber
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" dist/release/* \
              --title "$tag" \
              --notes-file "$notes_file"
          fi
